# ===========================================================================
# docker-compose.test.yml — Comprehensive Integration Test Composition
#
# Usage:
#   # Run ALL tests (backend + Flask + NGINX + frontend E2E):
#   docker compose -f docker-compose.test.yml up --build --abort-on-container-exit
#
#   # Run only backend integration tests:
#   docker compose -f docker-compose.test.yml up --build test-backend --abort-on-container-exit
#
#   # Run only ML Pipeline pytest:
#   docker compose -f docker-compose.test.yml up --build test-ml-pipeline --abort-on-container-exit
#
#   # Run only frontend unit/hook tests:
#   docker compose -f docker-compose.test.yml up --build test-frontend-unit --abort-on-container-exit
#
#   # Run only frontend static checks across the shell, remotes, and monitor:
#   docker compose -f docker-compose.test.yml up --build test-frontend-static --abort-on-container-exit
#
#   # Run only hero/operator UI bundle budget checks:
#   docker compose -f docker-compose.test.yml up --build test-frontend-budgets --abort-on-container-exit
#
#   # Run only AI monitor component tests:
#   docker compose -f docker-compose.test.yml up --build test-ai-monitor-component --abort-on-container-exit
#
#   # Run only AI monitor browser behavior tests:
#   docker compose -f docker-compose.test.yml up --build test-ai-monitor-behavior --abort-on-container-exit
#
#   # Run only NGINX gateway tests:
#   docker compose -f docker-compose.test.yml up --build test-nginx-gateway --abort-on-container-exit
#
#   # Run only Playwright E2E tests:
#   docker compose -f docker-compose.test.yml up --build test-e2e --abort-on-container-exit
#
#   # Run ALL suites in proper order with one command:
#   docker compose -f docker-compose.test.yml up --build --abort-on-container-exit test-all
#
#   # Run host-accessible test stack for Playwright UI (keeps CI stack unchanged):
#   docker compose -f docker-compose.test.yml --profile host-ui up -d \
#     test-shell-host test-nginx-host
# ===========================================================================

services:
  # =========================================================================
  # EPHEMERAL DATABASES — no volumes, destroyed on docker compose down
  # =========================================================================
  test-postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: cloudappdb_test
    networks:
      - test-backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d cloudappdb_test"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    tmpfs:
      - /var/lib/postgresql/data

  test-postgres-ml:
    image: postgres:15
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: segmentationdb_test
    networks:
      - test-backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d segmentationdb_test"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    tmpfs:
      - /var/lib/postgresql/data

  test-mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: testpass
      MYSQL_DATABASE: petstore_test
    networks:
      - test-backend
    healthcheck:
      test: ["CMD-SHELL", "mysql -uroot -ptestpass -e 'SELECT 1' >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
    tmpfs:
      - /var/lib/mysql

  test-mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: testuser
      MONGO_INITDB_ROOT_PASSWORD: testpass
      MONGO_INITDB_DATABASE: cloudappdb_test
    networks:
      - test-backend
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh \"mongodb://testuser:testpass@localhost:27017/admin?authSource=admin\" --quiet --eval \"db.adminCommand('ping').ok\" | grep 1",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
    tmpfs:
      - /data/db

  test-kafka:
    image: confluentinc/cp-kafka:7.2.3
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: test-zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://test-kafka:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      test-zookeeper:
        condition: service_healthy
    networks:
      - test-backend
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:29092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  test-zookeeper:
    image: confluentinc/cp-zookeeper:7.2.3
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,srvr,stat"
    networks:
      - test-backend
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 5s
      timeout: 3s
      retries: 10

  # =========================================================================
  # BACKEND INTEGRATION TESTS (Spring Boot — CloudApp)
  # =========================================================================
  test-backend:
    build:
      context: ./
      dockerfile: Dockerfile_BE
      args:
        SERVICE_PATH: backend/cloudapp
      target: builder
    entrypoint: ["mvn", "verify", "-f", "/home/root/pom.xml", "-Dspring.profiles.active=test"]
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://test-postgres:5432/cloudappdb_test
      - SPRING_DATASOURCE_USERNAME=testuser
      - SPRING_DATASOURCE_PASSWORD=testpass
      - SPRING_DATA_MONGODB_URI=mongodb://testuser:testpass@test-mongo:27017/cloudappdb_test?authSource=admin
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=test-kafka:29092
      - JWT_SECRET=test-secret-key-for-integration-tests-only-change-me
      - JWT_EXPIRATION_MS=3600000
      - INTERNAL_GATEWAY_ADMIN_TOKEN=test-gateway-admin-token
      - INTERNAL_AI_ORCHESTRATION_TOKEN=test-ai-orchestration-token
    depends_on:
      test-postgres:
        condition: service_healthy
      test-mongo:
        condition: service_healthy
      test-kafka:
        condition: service_healthy
    networks:
      - test-backend

  # =========================================================================
  # BACKEND INTEGRATION TESTS (Spring Boot — Petstore)
  # =========================================================================
  test-backend-petstore:
    build:
      context: ./
      dockerfile: Dockerfile_BE
      args:
        SERVICE_PATH: backend/petstore
      target: builder
    entrypoint: ["mvn", "verify", "-f", "/home/root/pom.xml", "-Dspring.profiles.active=test"]
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://test-mysql:3306/petstore_test?serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=testpass
      - INTERNAL_GATEWAY_ADMIN_TOKEN=test-gateway-admin-token
      - INTERNAL_AI_ORCHESTRATION_TOKEN=test-ai-orchestration-token
    depends_on:
      test-mysql:
        condition: service_healthy
    networks:
      - test-backend

  # =========================================================================
  # BACKEND INTEGRATION TESTS (Spring Boot — Vehicles API)
  # =========================================================================
  test-backend-vehicles:
    build:
      context: ./
      dockerfile: Dockerfile_BE
      args:
        SERVICE_PATH: backend/vehicles-api
      target: builder
    entrypoint: ["mvn", "verify", "-f", "/home/root/pom.xml", "-Dspring.profiles.active=test"]
    environment:
      - INTERNAL_GATEWAY_ADMIN_TOKEN=test-gateway-admin-token
      - INTERNAL_AI_ORCHESTRATION_TOKEN=test-ai-orchestration-token
    networks:
      - test-backend

  # =========================================================================
  # BACKEND INTEGRATION TESTS (Spring Boot — Web Proxy)
  # =========================================================================
  test-backend-webproxy:
    build:
      context: ./
      dockerfile: Dockerfile_BE
      args:
        SERVICE_PATH: backend/web-proxy
      target: builder
    entrypoint: ["mvn", "verify", "-f", "/home/root/pom.xml", "-Dspring.profiles.active=test"]
    environment:
      - INTERNAL_GATEWAY_ADMIN_TOKEN=test-gateway-admin-token
      - INTERNAL_AI_ORCHESTRATION_TOKEN=test-ai-orchestration-token
    networks:
      - test-backend

  # =========================================================================
  # ML PIPELINE TESTS (Flask/pytest)
  # =========================================================================
  test-ml-pipeline:
    build:
      context: ./
      dockerfile: Dockerfile_PY
      args:
        SERVICE_PATH: backend/ml-pipeline
        SERVICE_PORT: 8600
    entrypoint: ["sh", "-c", "pip install pytest pytest-cov pytest-timeout && cd /src && pytest /tests -v --tb=short --timeout=120"]
    environment:
      - ML_DB_USER=testuser
      - ML_DB_PASSWORD=testpass
      - ML_DB_HOST=test-postgres-ml
      - ML_DB_PORT=5432
      - ML_DB_NAME=segmentationdb_test
      - OTEL_ENABLED=false
    volumes:
      - ./tests/ml-pipeline:/tests:ro
    depends_on:
      test-postgres-ml:
        condition: service_healthy
    networks:
      - test-backend

  # =========================================================================
  # AI ORCHESTRATION LAYER UNIT TESTS (pytest)
  # =========================================================================
  test-ai-orchestration-layer:
    image: python:3.12-slim
    working_dir: /app
    entrypoint:
      [
        "sh",
        "-c",
        "pip install --no-cache-dir pytest pytest-asyncio pytest-timeout httpx fastapi pydantic && PYTHONPATH=/app/src:/app/src/tools AI_ORCH_SRC=/app/src pytest /tests -v --tb=short --timeout=60 -p no:cacheprovider",
      ]
    volumes:
      - ./ai-orchestration/ai-orchestration-layer/src:/app/src:ro
      - ./tests/ai-orchestration-layer:/tests:ro

  # =========================================================================
  # AI ORCHESTRATION MONITOR CHECKS (TypeScript typecheck + lint + build)
  # =========================================================================
  test-ai-monitor-lint:
    image: node:20-slim
    working_dir: /build
    entrypoint:
      [
        "sh",
        "-lc",
        "tar --exclude='.git' --exclude='node_modules' --exclude='*/node_modules' -cf - -C /workspace . | tar -xf - -C /build && cd /build/ai-orchestration/ai-orchestration-monitor && npm install --no-audit --no-fund ../../packages/contracts ../../packages/api-clients ../../packages/auth ../../packages/ui && npm install --no-audit --no-fund && case \"$(node -p \"process.arch\")\" in arm64) ROLLUP_PACKAGE='@rollup/rollup-linux-arm64-gnu' ;; x64) ROLLUP_PACKAGE='@rollup/rollup-linux-x64-gnu' ;; *) ROLLUP_PACKAGE='' ;; esac && if [ -n \"$${ROLLUP_PACKAGE}\" ] && [ ! -d \"node_modules/$${ROLLUP_PACKAGE}\" ]; then ROLLUP_VERSION=\"$(node -p \"require('./node_modules/rollup/package.json').version\")\" && npm install --no-save \"$${ROLLUP_PACKAGE}@$${ROLLUP_VERSION}\"; fi && node -e \"require('./node_modules/rollup/dist/native.js')\" && npm run typecheck && npm run lint && npm run build:budget",
      ]
    environment:
      - CI=true
    volumes:
      - ./:/workspace:ro

  # =========================================================================
  # AI ORCHESTRATION MONITOR COMPONENT TESTS (Vitest + jsdom)
  # =========================================================================
  test-ai-monitor-component:
    image: node:20-slim
    working_dir: /build
    entrypoint:
      [
        "sh",
        "-lc",
        "tar --exclude='.git' --exclude='node_modules' --exclude='*/node_modules' -cf - -C /workspace . | tar -xf - -C /build && cd /build/ai-orchestration/ai-orchestration-monitor && npm install --no-audit --no-fund ../../packages/contracts ../../packages/api-clients ../../packages/auth ../../packages/ui && npm install --no-audit --no-fund && case \"$(node -p \"process.arch\")\" in arm64) ROLLUP_PACKAGE='@rollup/rollup-linux-arm64-gnu' ;; x64) ROLLUP_PACKAGE='@rollup/rollup-linux-x64-gnu' ;; *) ROLLUP_PACKAGE='' ;; esac && if [ -n \"$${ROLLUP_PACKAGE}\" ] && [ ! -d \"node_modules/$${ROLLUP_PACKAGE}\" ]; then ROLLUP_VERSION=\"$(node -p \"require('./node_modules/rollup/package.json').version\")\" && npm install --no-save \"$${ROLLUP_PACKAGE}@$${ROLLUP_VERSION}\"; fi && node -e \"require('./node_modules/rollup/dist/native.js')\" && npm run test -- --reporter=dot",
      ]
    environment:
      - CI=true
    volumes:
      - ./:/workspace:ro

  # =========================================================================
  # AI ORCHESTRATION MONITOR BEHAVIOR TESTS (Playwright monitor flow)
  # =========================================================================
  test-ai-monitor-behavior:
    build:
      context: ./
      dockerfile: Dockerfile_PW
    command: ["e2e/monitor.spec.ts", "--project=chromium", "-c", "playwright.config.ts"]
    environment:
      - CI=true
      - BACKEND_URL=http://test-nginx:80
      - MONITOR_URL=http://test-ai-monitor:5010
    volumes:
      - ./e2e:/e2e/e2e
      - ./playwright.config.ts:/e2e/playwright.config.ts:ro
      - ./playwright-report-monitor:/e2e/playwright-report
      - ./test-results-monitor:/e2e/test-results
    depends_on:
      test-ai-monitor:
        condition: service_healthy
    networks:
      - test-frontend
      - test-backend

  # =========================================================================
  # FRONTEND UNIT TESTS (Jest + React Testing Library)
  # =========================================================================
  web-test:
    image: node:22-alpine
    working_dir: /workspace/frontend/cloudapp-shell
    environment:
      - CI=true
    volumes:
      - ./:/workspace
      - /workspace/frontend/cloudapp-shell/node_modules

  ios-pods:
    image: ruby:3.3
    working_dir: /workspace/frontend/cloudapp-shell/ios/App
    environment:
      - GEM_HOME=/tmp/gems
      - GEM_PATH=/tmp/gems
      - HOME=/tmp/cocoapods-home
      - COCOAPODS_DISABLE_STATS=true
      - POD_VERSION=1.16.2
    volumes:
      - ./:/workspace
    entrypoint:
      [
        "sh",
        "-lc",
        "set -e; mkdir -p \"$$HOME\"; export PATH=\"$$GEM_HOME/bin:$$PATH\"; gem install --no-document cocoapods -v \"$$POD_VERSION\" >/tmp/gem-install.log 2>&1 || { cat /tmp/gem-install.log; exit 1; }; pod install --repo-update",
      ]

  test-frontend-unit:
    image: node:20-alpine
    working_dir: /build
    entrypoint:
      [
        "sh",
        "-lc",
        "set -e; rm -rf /build && mkdir -p /build && tar --exclude='.git' --exclude='node_modules' --exclude='*/node_modules' -cf - -C /workspace . | tar -xf - -C /build && cd /build && npm ci --workspace frontend/cloudapp-shell --include-workspace-root=false && npm run --workspace frontend/cloudapp-shell test -- --coverage",
      ]
    environment:
      - CI=true
    volumes:
      - ./:/workspace:ro

  test-frontend-static:
    image: node:20-slim
    working_dir: /build
    entrypoint:
      [
        "sh",
        "-lc",
        "set -e; rm -rf /build && mkdir -p /build && tar --exclude='.git' --exclude='node_modules' --exclude='*/node_modules' -cf - -C /workspace . | tar -xf - -C /build && cd /build && npm ci --ignore-scripts --workspaces --include-workspace-root=false --include=optional && npm run frontend:check-versions && npm run architecture:check && npm run frontend:static",
      ]
    environment:
      - CI=true
    volumes:
      - ./:/workspace:ro

  test-frontend-budgets:
    image: node:20-slim
    working_dir: /build
    entrypoint:
      [
        "sh",
        "-lc",
        "set -e; rm -rf /build && mkdir -p /build && tar --exclude='.git' --exclude='node_modules' --exclude='*/node_modules' -cf - -C /workspace . | tar -xf - -C /build && cd /build && npm ci --workspace frontend/cloudapp-shell --include-workspace-root=false --include=optional && case \"$(node -p \"process.arch\")\" in arm64) NATIVE_SUFFIX='arm64-gnu' ;; x64) NATIVE_SUFFIX='x64-gnu' ;; arm) NATIVE_SUFFIX='arm-gnueabihf' ;; *) NATIVE_SUFFIX='' ;; esac && MISSING_NATIVE_PACKAGES='' && if [ -n \"$${NATIVE_SUFFIX}\" ]; then if [ ! -d \"frontend/cloudapp-shell/node_modules/lightningcss-linux-$${NATIVE_SUFFIX}\" ]; then LIGHTNING_VERSION=\"$(node -p \"require('./frontend/cloudapp-shell/node_modules/lightningcss/package.json').version\")\" && MISSING_NATIVE_PACKAGES=\"$${MISSING_NATIVE_PACKAGES} lightningcss-linux-$${NATIVE_SUFFIX}@$${LIGHTNING_VERSION}\"; fi && if [ -d \"frontend/cloudapp-shell/node_modules/@tailwindcss/oxide\" ] && [ ! -d \"frontend/cloudapp-shell/node_modules/@tailwindcss/oxide-linux-$${NATIVE_SUFFIX}\" ]; then OXIDE_VERSION=\"$(node -p \"require('./frontend/cloudapp-shell/node_modules/@tailwindcss/oxide/package.json').version\")\" && MISSING_NATIVE_PACKAGES=\"$${MISSING_NATIVE_PACKAGES} @tailwindcss/oxide-linux-$${NATIVE_SUFFIX}@$${OXIDE_VERSION}\"; fi && if [ -n \"$${MISSING_NATIVE_PACKAGES}\" ]; then npm install --workspace frontend/cloudapp-shell --no-save $${MISSING_NATIVE_PACKAGES}; fi; fi && node -e \"require('./frontend/cloudapp-shell/node_modules/lightningcss')\" && npm run --workspace frontend/cloudapp-shell build:budget",
      ]
    environment:
      - CI=true
    volumes:
      - ./:/workspace:ro

  # =========================================================================
  # TEST ORCHESTRATOR (single-command full matrix)
  #
  # Runs all test suites sequentially via nested docker compose commands
  # to guarantee infra ordering and deterministic exits.
  # =========================================================================
  test-all:
    image: docker:27.5.1-cli
    working_dir: ${PWD:-/workspace}
    volumes:
      - ./:${PWD:-/workspace}
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint:
      [
        "sh",
        "-lc",
        "set -eu; BASE_PROJECT=portfolio_test_all; PROJECT=$$BASE_PROJECT; SERVICES='test-backend test-backend-petstore test-backend-vehicles test-backend-webproxy test-ml-pipeline test-ai-orchestration-layer test-frontend-static test-frontend-budgets test-ai-monitor-lint test-ai-monitor-component test-ai-monitor-behavior test-frontend-unit test-nginx-gateway test-api-contracts test-e2e'; cleanup(){ docker compose -p $$PROJECT -f docker-compose.test.yml down -v --remove-orphans >/dev/null 2>&1 || true; }; trap cleanup EXIT INT TERM; cleanup; for svc in $$SERVICES; do PROJECT=\"$${BASE_PROJECT}_$${svc}\"; echo ''; echo \"=== Running $$svc ===\"; cleanup; docker compose -p $$PROJECT -f docker-compose.test.yml up --build --force-recreate --abort-on-container-exit $$svc; cleanup; done; PROJECT=$$BASE_PROJECT; trap - EXIT INT TERM; cleanup; echo ''; echo 'All test suites passed.'",
      ]

  # =========================================================================
  # NGINX GATEWAY TESTS
  # =========================================================================
  test-nginx-gateway:
    image: python:3.12-slim
    entrypoint: ["sh", "-c", "pip install pytest requests pytest-timeout && pytest /tests -v --tb=short --timeout=30"]
    environment:
      - NGINX_URL=http://test-nginx:80
      - BACKEND_URL=http://test-nginx:80
    volumes:
      - ./tests/nginx-gateway:/tests:ro
    depends_on:
      test-nginx:
        condition: service_healthy
      test-cloudapp:
        condition: service_healthy
    networks:
      - test-frontend
      - test-backend

  # =========================================================================
  # API CONTRACT GOVERNANCE TESTS (OpenAPI snapshots + generated TS clients)
  # =========================================================================
  test-api-contracts:
    image: python:3.12-slim
    working_dir: /workspace
    entrypoint: ["python3", "scripts/contracts/openapi_contracts.py", "check", "--check-generated"]
    volumes:
      - ./:/workspace
    depends_on:
      test-cloudapp:
        condition: service_healthy
      test-petstore:
        condition: service_healthy
      test-vehicles:
        condition: service_healthy
    networks:
      - test-backend

  # =========================================================================
  # PLAYWRIGHT E2E TESTS
  #
  # Runs headless Chromium inside the official Playwright Docker image.
  # Test results and traces are written to ./playwright-report on the host.
  #
  # Run locally with a browser instead:
  #   cd frontend/cloudapp-shell
  #   BASE_URL=http://localhost:5001 BACKEND_URL=http://localhost:80 \
  #     npx playwright test --headed
  # =========================================================================
  test-e2e-core:
    build:
      context: ./
      dockerfile: Dockerfile_PW
    environment:
      - CI=true
      - BASE_URL=http://test-shell-core:5001
      - BACKEND_URL=http://test-nginx-core:80
      - SHOWCASE_E2E_PROFILE=core
    volumes:
      - ./e2e:/e2e/e2e
      - ./playwright.config.ts:/e2e/playwright.config.ts:ro
      - ./playwright-report:/e2e/playwright-report
      - ./test-results:/e2e/test-results
    depends_on:
      test-shell-core:
        condition: service_healthy
      test-nginx-core:
        condition: service_healthy
    networks:
      - test-frontend
      - test-backend

  test-e2e:
    build:
      context: ./
      dockerfile: Dockerfile_PW
    environment:
      - CI=true
      - BASE_URL=http://test-shell:5001
      - BACKEND_URL=http://test-nginx:80
      - MONITOR_URL=http://test-ai-monitor:5010
      - SHOWCASE_E2E_PROFILE=extended
    volumes:
      # Always use the current host-side tests/snapshots/config instead of
      # whatever was baked into an older test-e2e image.
      - ./e2e:/e2e/e2e
      - ./playwright.config.ts:/e2e/playwright.config.ts:ro
      # Mount report output so it's accessible on the host after the run
      - ./playwright-report:/e2e/playwright-report
      - ./test-results:/e2e/test-results
    depends_on:
      test-shell:
        condition: service_healthy
      test-nginx:
        condition: service_healthy
      test-mlops-frontend:
        condition: service_healthy
      test-ai-monitor:
        condition: service_healthy
    networks:
      - test-frontend
      - test-backend

  # =========================================================================
  # APP SERVICES FOR E2E (minimal stack)
  # =========================================================================
  test-ai-monitor:
    build:
      context: ./
      dockerfile: ai-orchestration/ai-orchestration-monitor/Dockerfile
      args:
        # Use same-origin URLs in the browser test stack and let the Playwright
        # proxy/stubs forward monitor API calls to the gateway as needed.
        VITE_API_URL: http://test-ai-monitor:5010
        VITE_AI_BASE_URL: http://test-ai-monitor:5010/ai
        VITE_AI_WS_URL: ws://test-ai-monitor:5010/ai
        NODE_ENV: production
    depends_on:
      test-nginx:
        condition: service_healthy
    networks:
      - test-frontend
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:5010/').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: "no"

  test-cloudapp:
    build:
      context: ./
      dockerfile: Dockerfile_BE
      args:
        SERVICE_PATH: backend/cloudapp
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx384m
      - SPRING_PROFILES_ACTIVE=test
      - SPRING_DATASOURCE_USERNAME=testuser
      - SPRING_DATASOURCE_PASSWORD=testpass
      - SPRING_DATASOURCE_URL=jdbc:postgresql://test-postgres:5432/cloudappdb_test
      - SPRING_DATA_MONGODB_URI=mongodb://testuser:testpass@test-mongo:27017/cloudappdb_test?authSource=admin
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=test-kafka:29092
      - SPRING_KAFKA_PRODUCER_BOOTSTRAP_SERVERS=test-kafka:29092
      - SPRING_KAFKA_CONSUMER_BOOTSTRAP_SERVERS=test-kafka:29092
      - JWT_SECRET=test-secret-key-for-integration-tests-only-change-me
      - JWT_EXPIRATION_MS=3600000
      - JWT_PRIVATE_KEY_PATH=/run/secrets/jwt-private-key.pem
      - JWT_PUBLIC_KEY_PATH=/run/secrets/jwt-public-key.pub
      - CLOUDAPP_SECURITY_ADMIN_USERNAMES=integrationadmin
      - INTERNAL_GATEWAY_ADMIN_TOKEN=test-gateway-admin-token
      - INTERNAL_AI_ORCHESTRATION_TOKEN=test-ai-orchestration-token
      - HEALTH_CHECK_URL=http://localhost:8099/cloudapp/actuator/health
    depends_on:
      test-postgres:
        condition: service_healthy
      test-mongo:
        condition: service_healthy
      test-kafka:
        condition: service_healthy
    networks:
      test-backend:
        aliases:
          - cloudapp
    volumes:
      - ./backend/cloudapp/src/test/resources/test-private-key.pem:/run/secrets/jwt-private-key.pem:ro
      - ./backend/cloudapp/src/test/resources/test-public-key.pub:/run/secrets/jwt-public-key.pub:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8099/cloudapp/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: "no"

  test-petstore:
    build:
      context: ./
      dockerfile: Dockerfile_BE
      args:
        SERVICE_PATH: backend/petstore
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx384m
      - DOCKER_HOST_IP=host.docker.internal
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=testpass
      - SPRING_DATASOURCE_URL=jdbc:mysql://test-mysql:3306/petstore_test?serverTimezone=UTC
      - INTERNAL_GATEWAY_ADMIN_TOKEN=test-gateway-admin-token
      - INTERNAL_AI_ORCHESTRATION_TOKEN=test-ai-orchestration-token
      - HEALTH_CHECK_URL=http://localhost:8083/petstore/actuator/health
    depends_on:
      test-mysql:
        condition: service_healthy
    networks:
      test-backend:
        aliases:
          - petstore
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/petstore/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: on-failure

  test-vehicles:
    build:
      context: ./
      dockerfile: Dockerfile_BE
      args:
        SERVICE_PATH: backend/vehicles-api
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx384m
      - INTERNAL_GATEWAY_ADMIN_TOKEN=test-gateway-admin-token
      - INTERNAL_AI_ORCHESTRATION_TOKEN=test-ai-orchestration-token
      - HEALTH_CHECK_URL=http://localhost:8880/vehicles/actuator/health
    networks:
      test-backend:
        aliases:
          - vehicles-api
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8880/vehicles/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: "no"

  test-jiraproxy:
    build:
      context: ./
      dockerfile: Dockerfile_BE
      args:
        SERVICE_PATH: backend/web-proxy
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx384m
      - INTERNAL_GATEWAY_ADMIN_TOKEN=test-gateway-admin-token
      - INTERNAL_AI_ORCHESTRATION_TOKEN=test-ai-orchestration-token
      - HEALTH_CHECK_URL=http://localhost:8501/jiraproxy/actuator/health
    networks:
      test-backend:
        aliases:
          - jiraproxy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8501/jiraproxy/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: "no"

  test-mlops:
    build:
      context: ./
      dockerfile: Dockerfile_PY
      args:
        SERVICE_PATH: backend/ml-pipeline
        SERVICE_PORT: 8600
    environment:
      - ML_DB_USER=testuser
      - ML_DB_PASSWORD=testpass
      - ML_DB_HOST=test-postgres-ml
      - ML_DB_PORT=5432
      - ML_DB_NAME=segmentationdb_test
      - OTEL_ENABLED=false
    depends_on:
      test-postgres-ml:
        condition: service_healthy
    networks:
      test-backend:
        aliases:
          - mlops-segmentation
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8600/mlops-segmentation/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: "no"

  test-nginx-core:
    build:
      context: ./frontend/nginx
      dockerfile: Dockerfile
    environment:
      - INTERNAL_GATEWAY_ADMIN_TOKEN=test-gateway-admin-token
      - INTERNAL_AI_ORCHESTRATION_TOKEN=test-ai-orchestration-token
    volumes:
      - ./backend/cloudapp/src/test/resources/test-public-key.pub:/etc/nginx/localhost+3-key.pub:ro
    depends_on:
      test-cloudapp:
        condition: service_healthy
    networks:
      - test-frontend
      - test-backend
    healthcheck:
      test: ["CMD-SHELL", "curl -4sf http://localhost/nginx_health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: "no"

  test-nginx:
    build:
      context: ./frontend/nginx
      dockerfile: Dockerfile
    environment:
      - INTERNAL_GATEWAY_ADMIN_TOKEN=test-gateway-admin-token
      - INTERNAL_AI_ORCHESTRATION_TOKEN=test-ai-orchestration-token
    volumes:
      - ./backend/cloudapp/src/test/resources/test-public-key.pub:/etc/nginx/localhost+3-key.pub:ro
    depends_on:
      test-cloudapp:
        condition: service_healthy
      test-petstore:
        condition: service_healthy
      test-vehicles:
        condition: service_healthy
      test-jiraproxy:
        condition: service_healthy
      test-mlops:
        condition: service_healthy
    networks:
      - test-frontend
      - test-backend
    healthcheck:
      test: ["CMD-SHELL", "curl -4sf http://localhost/nginx_health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: "no"

  test-openmaps-frontend:
    build:
      context: ./
      dockerfile: Dockerfile_FE
      args:
        SERVICE_PATH: frontend/remote/openmaps
        SERVICE_PORT: 5002
        NEXT_PRIVATE_LOCAL_WEBPACK: true
        NEXT_PUBLIC_GATEWAY_BASE_URL: http://test-nginx:80
    networks:
      - test-frontend
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5002/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: "no"

  test-jira-frontend:
    build:
      context: ./
      dockerfile: Dockerfile_FE
      args:
        SERVICE_PATH: frontend/remote/jira
        SERVICE_PORT: 5003
        NEXT_PRIVATE_LOCAL_WEBPACK: true
        NEXT_PUBLIC_GATEWAY_BASE_URL: http://test-nginx:80
    networks:
      - test-frontend
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5003/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: "no"

  test-mlops-frontend:
    build:
      context: ./
      dockerfile: Dockerfile_FE
      args:
        SERVICE_PATH: frontend/remote/mlops
        SERVICE_PORT: 5005
        NEXT_PRIVATE_LOCAL_WEBPACK: true
        # In browser E2E the MLOps remote runs inside the shell origin, so use
        # the shell host and let the Playwright proxy forward same-origin API
        # calls to the test gateway with the active auth state.
        NEXT_PUBLIC_API_URL: http://test-shell:5001
    networks:
      - test-frontend
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5005/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: "no"

  test-petstore-frontend:
    build:
      context: ./
      dockerfile: Dockerfile_FE
      args:
        SERVICE_PATH: frontend/remote/petstore
        SERVICE_PORT: 5006
        NEXT_PRIVATE_LOCAL_WEBPACK: true
        NEXT_PUBLIC_GATEWAY_BASE_URL: http://test-nginx:80
    networks:
      - test-frontend
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5006/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: "no"

  test-chatllm-frontend:
    build:
      context: ./
      dockerfile: Dockerfile_FE
      args:
        SERVICE_PATH: frontend/remote/chatllm
        SERVICE_PORT: 5333
        NEXT_PRIVATE_LOCAL_WEBPACK: true
    networks:
      - test-frontend
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5333/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: "no"

  test-shell-core:
    build:
      context: ./
      dockerfile: Dockerfile_FE
      args:
        SERVICE_PATH: frontend/cloudapp-shell
        SERVICE_PORT: 5001
        NEXT_PRIVATE_LOCAL_WEBPACK: true
        NEXT_PUBLIC_REMOTE_OPENMAPS_URL: http://test-openmaps-frontend:5002
        NEXT_PUBLIC_REMOTE_JIRA_URL: http://test-jira-frontend:5003
        NEXT_PUBLIC_REMOTE_CHATLLM_URL: http://test-chatllm-frontend:5333
        NEXT_PUBLIC_REMOTE_MLOPS_URL: http://test-mlops-frontend:5005
        NEXT_PUBLIC_REMOTE_PETSTORE_URL: http://test-petstore-frontend:5006
        NEXT_PUBLIC_ENABLE_OPENMAPS: "true"
        NEXT_PUBLIC_ENABLE_CHATLLM: "false"
        NEXT_PUBLIC_ENABLE_JIRA: "false"
        NEXT_PUBLIC_ENABLE_MLOPS: "false"
        NEXT_PUBLIC_ENABLE_PETSTORE: "false"
        NEXT_PUBLIC_API_URL: /cloudapp
        NEXT_PUBLIC_CHAT_WS_API_URL: http://test-nginx-core/cloudapp
    environment:
      - NEXT_PUBLIC_CHAT_WS_API_URL=http://test-nginx-core/cloudapp
      - NEXT_PUBLIC_ENABLE_OPENMAPS=true
      - NEXT_PUBLIC_ENABLE_CHATLLM=false
      - NEXT_PUBLIC_ENABLE_JIRA=false
      - NEXT_PUBLIC_ENABLE_MLOPS=false
      - NEXT_PUBLIC_ENABLE_PETSTORE=false
    networks:
      - test-frontend
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5001/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: "no"

  test-shell:
    build:
      context: ./
      dockerfile: Dockerfile_FE
      args:
        SERVICE_PATH: frontend/cloudapp-shell
        SERVICE_PORT: 5001
        NEXT_PRIVATE_LOCAL_WEBPACK: true
        NEXT_PUBLIC_REMOTE_OPENMAPS_URL: http://test-openmaps-frontend:5002
        NEXT_PUBLIC_REMOTE_JIRA_URL: http://test-jira-frontend:5003
        NEXT_PUBLIC_REMOTE_CHATLLM_URL: http://test-chatllm-frontend:5333
        NEXT_PUBLIC_REMOTE_MLOPS_URL: http://test-mlops-frontend:5005
        NEXT_PUBLIC_REMOTE_PETSTORE_URL: http://test-petstore-frontend:5006
        NEXT_PUBLIC_ENABLE_OPENMAPS: "true"
        NEXT_PUBLIC_ENABLE_CHATLLM: "true"
        NEXT_PUBLIC_ENABLE_JIRA: "true"
        NEXT_PUBLIC_ENABLE_MLOPS: "true"
        NEXT_PUBLIC_ENABLE_PETSTORE: "true"
        NEXT_PUBLIC_API_URL: /cloudapp
        NEXT_PUBLIC_CHAT_WS_API_URL: http://test-nginx/cloudapp
    environment:
      - NEXT_PUBLIC_CHAT_WS_API_URL=http://test-nginx/cloudapp
      - NEXT_PUBLIC_ENABLE_OPENMAPS=true
      - NEXT_PUBLIC_ENABLE_CHATLLM=true
      - NEXT_PUBLIC_ENABLE_JIRA=true
      - NEXT_PUBLIC_ENABLE_MLOPS=true
      - NEXT_PUBLIC_ENABLE_PETSTORE=true
      - REMOTE_STATUS_OPENMAPS_URL=http://test-openmaps-frontend:5002
      - REMOTE_STATUS_CHATLLM_URL=http://test-chatllm-frontend:5333
      - REMOTE_STATUS_JIRA_URL=http://test-jira-frontend:5003
      - REMOTE_STATUS_MLOPS_URL=http://test-mlops-frontend:5005
      - REMOTE_STATUS_PETSTORE_URL=http://test-petstore-frontend:5006
    depends_on:
      test-openmaps-frontend:
        condition: service_healthy
      test-jira-frontend:
        condition: service_healthy
      test-mlops-frontend:
        condition: service_healthy
      test-petstore-frontend:
        condition: service_healthy
      test-chatllm-frontend:
        condition: service_healthy
    networks:
      - test-frontend
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5001/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: "no"

  # =========================================================================
  # HOST-UI PROFILE SERVICES
  #
  # Optional host-exposed variants for local Playwright UI/debug runs.
  # They are excluded from CI unless --profile host-ui is explicitly enabled.
  # =========================================================================
  test-nginx-host:
    profiles: ["host-ui"]
    build:
      context: ./frontend/nginx
      dockerfile: Dockerfile
    environment:
      - INTERNAL_GATEWAY_ADMIN_TOKEN=test-gateway-admin-token
      - INTERNAL_AI_ORCHESTRATION_TOKEN=test-ai-orchestration-token
    ports:
      - "80:80"
    depends_on:
      test-cloudapp:
        condition: service_healthy
      test-petstore:
        condition: service_healthy
      test-vehicles:
        condition: service_healthy
      test-jiraproxy:
        condition: service_healthy
      test-mlops:
        condition: service_healthy
    networks:
      - test-frontend
      - test-backend
    healthcheck:
      test: ["CMD-SHELL", "curl -4sf http://localhost/nginx_health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: "no"

  test-mlops-frontend-host:
    profiles: ["host-ui"]
    build:
      context: ./
      dockerfile: Dockerfile_FE
      args:
        SERVICE_PATH: frontend/remote/mlops
        SERVICE_PORT: 5005
        NEXT_PRIVATE_LOCAL_WEBPACK: true
        NEXT_PUBLIC_API_URL: http://localhost
    ports:
      - "5005:5005"
    networks:
      - test-frontend
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5005/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: "no"

  test-shell-host:
    profiles: ["host-ui"]
    build:
      context: ./
      dockerfile: Dockerfile_FE
      args:
        SERVICE_PATH: frontend/cloudapp-shell
        SERVICE_PORT: 5001
        NEXT_PRIVATE_LOCAL_WEBPACK: true
        NEXT_PUBLIC_API_URL: /cloudapp
        NEXT_PUBLIC_REMOTE_MLOPS_URL: http://localhost:5005
    ports:
      - "5001:5001"
    depends_on:
      test-mlops-frontend-host:
        condition: service_healthy
    networks:
      - test-frontend
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5001/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: "no"

# ===========================================================================
# NETWORKS — isolated from production
# ===========================================================================
networks:
  test-frontend: {}
  test-backend: {}
